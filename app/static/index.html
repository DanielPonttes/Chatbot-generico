<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>EcoApp - Hub Principal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #218084;
            --primary-light: #32b8c6;
            --primary-dark: #1a6470;
            --accent: #e67e22;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #ecf0f1;
        }

        .card-custom {
            background: var(--card);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(33, 128, 132, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .card-custom:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(33, 128, 132, 0.2);
            border-color: var(--primary-light);
        }

        .header-custom {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(33, 128, 132, 0.2);
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#218084',
                        'primary-light': '#32b8c6',
                        'primary-dark': '#1a6470',
                        accent: '#e67e22',
                        success: '#27ae60',
                        warning: '#f39c12',
                        danger: '#e74c3c',
                        background: '#f8f9fa',
                        card: '#ffffff',
                        border: '#ecf0f1',
                    }
                }
            }
        }
    </script>
</head>

<body class="h-screen flex flex-col items-center overflow-auto p-4 md:p-8">
    <!-- Global Settings Button and Real-Time Status -->
    <div class="fixed top-4 right-4 z-40 flex items-center gap-2 cursor-pointer" onclick="toggleGlobalModal(true)">
        <span class="api-status-text text-xs font-medium text-text-light">Verificando...</span>
        <div class="api-status-dot w-3 h-3 rounded-full bg-gray-400 shadow-sm" title="Verificando API..."></div>
        <button
            class="bg-white/80 backdrop-blur border border-border text-text p-2 rounded-full shadow-md hover:bg-gray-50 transition-colors ml-2">
            <i data-lucide="settings" class="w-5 h-5"></i>
        </button>
    </div>

    <div class="w-full max-w-4xl space-y-8 mt-4">

        <!-- Header -->
        <div class="header-custom w-full">
            <h1 class="text-3xl font-bold mb-2">EcoApp - Hub Principal</h1>
            <p class="text-white/80">Seja bem-vindo(a)! Escolha uma das ferramentas abaixo para continuar.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <a href="/notifications" class="block">
                <div class="card-custom p-6 h-full flex flex-col items-center text-center">
                    <div
                        class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center text-primary mb-4">
                        <i data-lucide="bell" class="w-8 h-8"></i>
                    </div>
                    <h2 class="text-xl font-bold text-gray-800 mb-2">Notificações</h2>
                    <p class="text-gray-500 text-sm">Geração de notificações proativas com o bot.</p>
                </div>
            </a>

            <a href="/rag" class="block">
                <div class="card-custom p-6 h-full flex flex-col items-center text-center">
                    <div
                        class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center text-primary mb-4">
                        <i data-lucide="database" class="w-8 h-8"></i>
                    </div>
                    <h2 class="text-xl font-bold text-gray-800 mb-2">Checar RAG</h2>
                    <p class="text-gray-500 text-sm">Consulte a base de vetores dos manuais.</p>
                </div>
            </a>

        </div>

    </div>

    <script>
        lucide.createIcons();
    </script>

    <!-- Settings/Health Modal (Global) -->
    <div id="globalSettingsModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="toggleGlobalModal(false)"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md p-6">
            <div class="bg-white rounded-2xl shadow-2xl p-6 space-y-6 border border-border">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-semibold text-text">Configurações & Status</h3>
                    <button onclick="toggleGlobalModal(false)"
                        class="text-text-light hover:text-text transition-colors">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>

                <div class="space-y-4">
                    <!-- LLM Service Health -->
                    <div class="p-4 bg-gray-50 rounded-lg border border-border">
                        <div class="flex items-center gap-3 mb-2">
                            <div
                                class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                                <i data-lucide="activity" class="w-4 h-4"></i>
                            </div>
                            <div>
                                <h4 class="font-medium text-sm text-text">Status do Serviço LLM</h4>
                                <p class="text-xs text-text-light" id="healthStatusText">Verificando...</p>
                            </div>
                        </div>
                    </div>

                    <!-- Model Selection (if applicable) -->
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-text">Modelo Preferencial (Notificações)</label>
                        <select id="globalModelSelect"
                            class="w-full bg-white border border-border text-text rounded-lg px-3 py-2 focus:ring-2 focus:ring-primary outline-none">
                            <option value="">Padrão do Sistema</option>
                            <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
                            <option value="gemini-3-pro-preview">Gemini 3 Pro Preview</option>
                        </select>
                    </div>
                </div>

                <div class="flex justify-end pt-2">
                    <button onclick="saveGlobalConfig()"
                        class="bg-primary hover:bg-primary-light text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                        Salvar e Fechar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleGlobalModal(show) {
            document.getElementById('globalSettingsModal').classList.toggle('hidden', !show);
            if (show) { checkHealth(); }
        }

        async function checkHealth() {
            const statusEl = document.getElementById('healthStatusText');
            if (!statusEl) return;
            statusEl.textContent = "Verificando...";
            statusEl.className = "text-xs text-text-light";
            try {
                const res = await fetch('/health');
                const data = await res.json();
                if (data.status === 'ok' || data.status === 'healthy') {
                    statusEl.textContent = `Online (${data.provider} - ${data.model})`;
                    statusEl.className = "text-xs text-success font-medium";
                } else {
                    statusEl.textContent = "Problemas detectados";
                    statusEl.className = "text-xs text-danger font-medium";
                }
            } catch (e) {
                statusEl.textContent = "Falha ao conectar";
                statusEl.className = "text-xs text-danger font-medium";
            }
        }

        function saveGlobalConfig() {
            const model = document.getElementById('globalModelSelect').value;
            if (window.config) window.config.modelOverride = model;
            toggleGlobalModal(false);
        }

        async function pollHealthStatus() {
            const dots = document.querySelectorAll('.api-status-dot');
            const texts = document.querySelectorAll('.api-status-text');
            try {
                const res = await fetch('/health');
                const data = await res.json();
                const isOk = data.status === 'ok' || data.status === 'healthy';
                const color = isOk ? 'bg-success' : 'bg-danger';
                const pulse = isOk ? '' : 'animate-pulse';
                const title = isOk ? `API Online (${data.provider})` : 'Erro na API';

                dots.forEach(dot => {
                    dot.className = `api-status-dot w-3 h-3 rounded-full ${color} ${pulse} shadow-sm cursor-help`;
                    dot.title = title;
                });

                texts.forEach(t => {
                    t.textContent = isOk ? data.model : 'Erro';
                    t.className = `api-status-text text-xs mr-2 font-medium ${isOk ? 'text-text-light' : 'text-danger'}`;
                });
            } catch (e) {
                dots.forEach(dot => {
                    dot.className = `api-status-dot w-3 h-3 rounded-full bg-danger shadow-sm cursor-help`;
                    dot.title = 'Offline / Sem Conexão';
                });
                texts.forEach(t => {
                    t.textContent = 'Offline';
                    t.className = `api-status-text text-xs mr-2 font-medium text-danger`;
                });
            }
        }

        pollHealthStatus();
        setInterval(pollHealthStatus, 15000);

        setTimeout(() => { if (window.lucide) { lucide.createIcons(); } }, 500);
    </script>
</body>

</html>
